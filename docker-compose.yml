version: '3.9'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: player-journey-backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:///./player_data.db
      - CORS_ORIGINS=["http://localhost:3000","http://frontend:3000"]
      - LOG_LEVEL=info
      - PYTHONUNBUFFERED=1
    volumes:
      - ./backend/app:/app/app
      - ./player_data:/app/player_data
      - backend-data:/app
    networks:
      - player-journey-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: player-journey-frontend
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://localhost:8000
      - NODE_ENV=production
    networks:
      - player-journey-net
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    depends_on:
      backend:
        condition: service_healthy

networks:
  player-journey-net:
    driver: bridge

volumes:
  backend-data:
    driver: local
  player-data:
    driver: local
